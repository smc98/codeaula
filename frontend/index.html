<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="public/favicon.svg" type="image/x-icon">
    <title>Codeaula</title>
    <meta name="description" content="Comparte y revisa código en tiempo real en el aula." />
    <script>
      // Evita el parpadeo de tema: aplica data-theme antes de que React monte,
      // leyendo la misma clave de localStorage que usa el hook useTheme.
      (function () {
        var saved = localStorage.getItem("codeaula_theme");
        document.documentElement.setAttribute("data-theme", saved === "light" ? "light" : "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
